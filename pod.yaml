apiVersion: v1
kind: Pod
metadata:
  name: myapp
  labels:
    run: myapp
spec:
  containers:
  - name: myapp
    image: ttl.sh/danieluh2019-node:2h
    imagePullPolicy: Always
    ports:
    - containerPort: 4444
    resources:
      requests:
        memory: "32Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "250m"
    readinessProbe:
      httpGet:
        path: /
        port: 4444
      initialDelaySeconds: 2
      periodSeconds: 5
    livenessProbe:
      httpGet:
        path: /
        port: 4444
      initialDelaySeconds: 5
      periodSeconds: 10
  restartPolicy: Always
